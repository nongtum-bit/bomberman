<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Game Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{height:100%;height:100dvh;background:linear-gradient(165deg,#0b0a1f 0%,#14122b 50%,#1a1635 100%);font-family:'Outfit',system-ui,sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
h1{font-size:2rem;font-weight:800;margin-bottom:8px;background:linear-gradient(90deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{opacity:.7;margin-bottom:40px;font-size:.95rem}
.menu{display:flex;flex-direction:column;gap:16px;width:100%;max-width:320px}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:22px 20px;text-align:center;text-decoration:none;color:#fff;transition:transform .15s,background .15s}
.card:active{transform:scale(.97)}
.card .icon{font-size:2.4rem;margin-bottom:8px}
.card .title{font-size:1.25rem;font-weight:700;margin-bottom:4px}
.card .desc{font-size:.85rem;opacity:.7}
.card.bomber{border-color:rgba(0,210,255,.3)}
.card.tank{border-color:rgba(255,180,50,.3)}
.footer{margin-top:40px;font-size:.78rem;opacity:.45}
</style>
</head>
<body>
  <h1>Game Hub</h1>
  <p class="sub">เลือกเกมที่ต้องการเล่น</p>
  <div class="menu">
    <a href="bomberman.html" class="card bomber">
      <div class="icon">💣</div>
      <div class="title">Modern Bomberman</div>
      <div class="desc">วางระเบิด • ทำลายบล็อก • เก็บ Power-up</div>
    </a>
    <a href="tank.html" class="card tank">
      <div class="icon">🚀</div>
      <div class="title">Tank Battle</div>
      <div class="desc">รถถัง • ยิงศัตรู • อยู่รอด</div>
    </a>
  </div>
  <div class="footer">nongtum-bit • GitHub Pages</div>
</body>
</html>
