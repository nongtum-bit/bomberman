<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Tank Battle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:#0b0a1f;font-family:'Outfit',system-ui,sans-serif;color:#fff;position:fixed;inset:0}
body{display:flex;flex-direction:column;align-items:center;padding:env(safe-area-inset-top,6px) 8px env(safe-area-inset-bottom,6px);background:linear-gradient(165deg,#0b0a1f 0%,#14122b 45%,#1a1635 100%)}
.top{width:100%;max-width:480px;display:flex;justify-content:space-between;padding:6px 4px;font-size:.85rem;font-weight:600;flex-shrink:0}
.top .item{background:rgba(255,255,255,.1);padding:5px 12px;border-radius:18px}
.game-box{position:relative;width:100%;max-width:480px;border-radius:16px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.55);background:#0d0b1e;flex:1;min-height:0}
canvas{display:block;width:100%;height:auto;background:#0f0e1a}
.overlay{position:absolute;inset:0;background:rgba(8,6,22,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;opacity:0;pointer-events:none;transition:opacity .28s;text-align:center;padding:24px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:1.8rem;font-weight:800;margin-bottom:8px}
.overlay p{opacity:.78;margin-bottom:20px;line-height:1.5}
.btn{padding:14px 36px;border:none;border-radius:14px;font-family:inherit;font-weight:700;font-size:1.05rem;background:linear-gradient(135deg,#f1c40f,#e67e22);color:#111;box-shadow:0 6px 20px rgba(241,196,15,.35)}
.btn:active{transform:scale(.96)}
.controls{width:100%;max-width:480px;display:flex;justify-content:space-between;align-items:flex-end;padding:12px 4px 6px;gap:14px;flex-shrink:0}
.dpad{display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px 60px;gap:4px}
.dpad-btn{width:60px;height:60px;border-radius:16px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.11);color:#fff;font-size:1.4rem;display:flex;align-items:center;justify-content:center}
.dpad-btn:active,.dpad-btn.active{background:rgba(241,196,15,.38);transform:scale(.93)}
.dpad-btn.empty{visibility:hidden}
.fire-btn{width:80px;height:80px;border-radius:50%;border:none;background:linear-gradient(145deg,#e74c3c,#c0392b);color:#fff;font-size:1.6rem;box-shadow:0 6px 22px rgba(231,76,60,.45);display:flex;align-items:center;justify-content:center}
.fire-btn:active,.fire-btn.active{transform:scale(.91)}
.back{position:absolute;top:10px;left:10px;z-index:30;background:rgba(0,0,0,.55);color:#fff;border:none;padding:6px 12px;border-radius:10px;font-size:.8rem;text-decoration:none;backdrop-filter:blur(4px)}
</style>
</head>
<body>
<div class="top">
  <div class="item">♥ <span id="lives">3</span></div>
  <div class="item">⭐ <span id="score">0</span></div>
  <div class="item">🚀 <span id="enemiesLeft">0</span></div>
</div>
<div class="game-box">
  <a href="index.html" class="back">← เมนู</a>
  <canvas id="game" width="480" height="480"></canvas>
  <div class="overlay show" id="overlay">
    <h2 id="ovTitle">Tank Battle</h2>
    <p id="ovMsg">ทำลายรถถังศัตรูให้หมด<br>ลูกศร = เคลื่อนที่ • ปุ่มแดง = ยิง</p>
    <button class="btn" id="startBtn">เริ่มเกม</button>
  </div>
</div>
<div class="controls">
  <div class="dpad">
    <div class="dpad-btn empty"></div>
    <button class="dpad-btn" data-dir="up">▲</button>
    <div class="dpad-btn empty"></div>
    <button class="dpad-btn" data-dir="left">◀</button>
    <div class="dpad-btn empty"></div>
    <button class="dpad-btn" data-dir="right">▶</button>
    <div class="dpad-btn empty"></div>
    <button class="dpad-btn" data-dir="down">▼</button>
    <div class="dpad-btn empty"></div>
  </div>
  <button class="fire-btn" id="fireBtn">🔥</button>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const TILE=40,COLS=12,ROWS=12;
const $=id=>document.getElementById(id);
let player,bullets=[],enemies=[],walls=[],particles=[];
let moveDir={x:0,y:0},gameState='ready',lastTime=0,score=0,lives=3,level=1;
function initLevel(){walls=[];for(let c=0;c<COLS;c++){walls.push({c,r:0});walls.push({c,r:ROWS-1});}for(let r=1;r<ROWS-1;r++){walls.push({c:0,r});walls.push({c:COLS-1,r});}const patterns=[[3,3],[4,3],[7,3],[8,3],[3,5],[8,5],[3,7],[4,7],[7,7],[8,7],[5,4],[6,4],[5,8],[6,8]];patterns.forEach(([c,r])=>walls.push({c,r}));for(let i=0;i<8;i++){const c=2+Math.floor(Math.random()*(COLS-4));const r=2+Math.floor(Math.random()*(ROWS-4));if(!walls.some(w=>w.c===c&&w.r===r)&&!(c<=2&&r<=2))walls.push({c,r});}player={x:1.5*TILE,y:1.5*TILE,dir:0,cooldown:0,radius:14};enemies=[];const count=Math.min(3+level,7);for(let i=0;i<count;i++){let c,r,tries=0;do{c=3+Math.floor(Math.random()*(COLS-6));r=3+Math.floor(Math.random()*(ROWS-6));tries++;}while((walls.some(w=>w.c===c&&w.r===r)||(c<4&&r<4))&&tries<40);enemies.push({x:(c+.5)*TILE,y:(r+.5)*TILE,dir:Math.floor(Math.random()*4),cooldown:600+Math.random()*800,timer:300+Math.random()*500,radius:14});}bullets=[];particles=[];$('enemiesLeft').textContent=enemies.length;$('score').textContent=score;$('lives').textContent=lives;}
function isBlocked(px,py,radius=12){const points=[[px-radius,py],[px+radius,py],[px,py-radius],[px,py+radius]];for(const[x,y]of points){const c=Math.floor(x/TILE),r=Math.floor(y/TILE);if(c<0||c>=COLS||r<0||r>=ROWS)return true;if(walls.some(w=>w.c===c&&w.r===r))return true;}return false;}
function update(dt){if(gameState!=='playing')return;const sp=2.4*(dt/16.67);let dx=0,dy=0;if(moveDir.y===-1){dy=-sp;player.dir=0;}else if(moveDir.y===1){dy=sp;player.dir=2;}else if(moveDir.x===-1){dx=-sp;player.dir=3;}else if(moveDir.x===1){dx=sp;player.dir=1;}if(dx!==0&&!isBlocked(player.x+dx,player.y,13))player.x+=dx;if(dy!==0&&!isBlocked(player.x,player.y+dy,13))player.y+=dy;player.x=Math.max(20,Math.min(COLS*TILE-20,player.x));player.y=Math.max(20,Math.min(ROWS*TILE-20,player.y));if(player.cooldown>0)player.cooldown-=dt;for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.x+=b.vx;b.y+=b.vy;if(b.x<8||b.x>COLS*TILE-8||b.y<8||b.y>ROWS*TILE-8||isBlocked(b.x,b.y,3)){for(let k=0;k<4;k++)particles.push({x:b.x,y:b.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:180,color:'#f1c40f'});bullets.splice(i,1);continue;}if(!b.fromEnemy){for(let j=enemies.length-1;j>=0;j--){const e=enemies[j];if(Math.hypot(b.x-e.x,b.y-e.y)<18){for(let k=0;k<10;k++)particles.push({x:e.x,y:e.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:350,color:k%2?'#e74c3c':'#f39c12'});enemies.splice(j,1);bullets.splice(i,1);score+=100;$('score').textContent=score;$('enemiesLeft').textContent=enemies.length;if(enemies.length===0){gameState='win';showOverlay('ชนะด่าน!','คะแนน '+score);}break;}}}}for(const e of enemies){e.timer-=dt;if(e.timer<=0){e.dir=Math.floor(Math.random()*4);e.timer=350+Math.random()*700;}const esp=1.35*(dt/16.67);let edx=0,edy=0;if(e.dir===0)edy=-esp;if(e.dir===2)edy=esp;if(e.dir===3)edx=-esp;if(e.dir===1)edx=esp;if(edx&&!isBlocked(e.x+edx,e.y,13))e.x+=edx;else e.dir=Math.floor(Math.random()*4);if(edy&&!isBlocked(e.x,e.y+edy,13))e.y+=edy;else e.dir=Math.floor(Math.random()*4);e.cooldown-=dt;if(e.cooldown<=0){e.cooldown=1100+Math.random()*900;const ang=[-Math.PI/2,0,Math.PI/2,Math.PI][e.dir];bullets.push({x:e.x+Math.cos(ang)*16,y:e.y+Math.sin(ang)*16,vx:Math.cos(ang)*4.8,vy:Math.sin(ang)*4.8,fromEnemy:true});}if(Math.hypot(e.x-player.x,e.y-player.y)<26)hurtPlayer();}for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];if(b.fromEnemy&&Math.hypot(b.x-player.x,b.y-player.y)<16){bullets.splice(i,1);hurtPlayer();}}for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=dt;p.vy+=.04;if(p.life<=0)particles.splice(i,1);}}
function hurtPlayer(){lives--;$('lives').textContent=lives;for(let k=0;k<8;k++)particles.push({x:player.x,y:player.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:280,color:'#3498db'});if(lives<=0){gameState='lose';showOverlay('คุณแพ้','คะแนน '+score);}else{player.x=1.5*TILE;player.y=1.5*TILE;player.dir=0;}}
function drawTank(x,y,dir,isPlayer){ctx.save();ctx.translate(x,y);ctx.rotate([-Math.PI/2,0,Math.PI/2,Math.PI][dir]);ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(0,4,16,10,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=isPlayer?'#1a5276':'#6e2c00';ctx.fillRect(-16,-13,8,26);ctx.fillRect(8,-13,8,26);const bodyGrad=ctx.createLinearGradient(-12,-10,12,10);if(isPlayer){bodyGrad.addColorStop(0,'#5dade2');bodyGrad.addColorStop(1,'#2874a6');}else{bodyGrad.addColorStop(0,'#ec7063');bodyGrad.addColorStop(1,'#922b21');}ctx.fillStyle=bodyGrad;roundRect(-12,-11,24,22,4);ctx.fill();ctx.fillStyle=isPlayer?'#85c1e9':'#f5b7b1';ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();ctx.fillStyle=isPlayer?'#d4e6f1':'#fadbd8';ctx.fillRect(6,-3.5,16,7);ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(-10,-9,14,5);ctx.restore();}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ctx.fillStyle=(r+c)%2===0?'#16142a':'#12102a';ctx.fillRect(c*TILE,r*TILE,TILE,TILE);}for(const w of walls){const x=w.c*TILE,y=w.r*TILE;const g=ctx.createLinearGradient(x,y,x+TILE,y+TILE);g.addColorStop(0,'#4a4568');g.addColorStop(1,'#2c2940');ctx.fillStyle=g;roundRect(x+3,y+3,TILE-6,TILE-6,6);ctx.fill();ctx.fillStyle='rgba(255,255,255,.07)';roundRect(x+6,y+6,TILE-16,7,3);ctx.fill();}for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/350);ctx.fillStyle=p.color||'#f1c40f';ctx.beginPath();ctx.arc(p.x,p.y,2.8,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}for(const b of bullets){ctx.beginPath();ctx.arc(b.x,b.y,4.5,0,Math.PI*2);ctx.fillStyle=b.fromEnemy?'#e74c3c':'#f1c40f';ctx.fill();ctx.beginPath();ctx.arc(b.x,b.y,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();}for(const e of enemies)drawTank(e.x,e.y,e.dir,false);if(player)drawTank(player.x,player.y,player.dir,true);}
function fire(){if(gameState!=='playing'||player.cooldown>0)return;player.cooldown=280;const ang=[-Math.PI/2,0,Math.PI/2,Math.PI][player.dir];bullets.push({x:player.x+Math.cos(ang)*18,y:player.y+Math.sin(ang)*18,vx:Math.cos(ang)*6.8,vy:Math.sin(ang)*6.8,fromEnemy:false});}
function showOverlay(title,msg){$('ovTitle').textContent=title;$('ovMsg').textContent=msg;$('startBtn').textContent=(gameState==='lose'||gameState==='win')?'เล่นอีกครั้ง':'เริ่มเกม';$('overlay').classList.add('show');}
function startGame(){lives=3;score=0;level=1;initLevel();gameState='playing';$('overlay').classList.remove('show');}
function loop(ts){if(!lastTime)lastTime=ts;const dt=Math.min(ts-lastTime,40);lastTime=ts;update(dt);draw();requestAnimationFrame(loop);}
document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn=>{const dir=btn.dataset.dir;const set=on=>{btn.classList.toggle('active',on);if(dir==='up')moveDir.y=on?-1:0;if(dir==='down')moveDir.y=on?1:0;if(dir==='left')moveDir.x=on?-1:0;if(dir==='right')moveDir.x=on?1:0;};btn.addEventListener('touchstart',e=>{e.preventDefault();set(true);},{passive:false});btn.addEventListener('touchend',e=>{e.preventDefault();set(false);});btn.addEventListener('touchcancel',()=>set(false));btn.addEventListener('mousedown',()=>set(true));btn.addEventListener('mouseup',()=>set(false));btn.addEventListener('mouseleave',()=>set(false));});
const fireBtn=$('fireBtn');const doFire=e=>{e.preventDefault();fireBtn.classList.add('active');fire();setTimeout(()=>fireBtn.classList.remove('active'),120);};fireBtn.addEventListener('touchstart',doFire,{passive:false});fireBtn.addEventListener('mousedown',doFire);
$('startBtn').addEventListener('click',startGame);$('startBtn').addEventListener('touchend',e=>{e.preventDefault();startGame();});
document.body.addEventListener('touchmove',e=>{if(e.target.closest('.dpad')||e.target.closest('.fire-btn')||e.target.tagName==='CANVAS')e.preventDefault();},{passive:false});
initLevel();requestAnimationFrame(loop);
</script>
</body>
</html>
